name: Build FK Muzik EXE
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install -g nativefier
      - run: mkdir fk-muzik-build
      - run: cp index.html style.css app.js fk-muzik-build/
      - run: nativefier --name "FK Muzik" fk-muzik-build/
      - uses: actions/upload-artifact@v3
        with:
          name: FK_Muzik_Windows
          path: FK\ Muzik-win32-x64/
